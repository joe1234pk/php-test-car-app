apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: cartest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      containers:
        - name: app
          image: cartest-be:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: cartest-app-config
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: cartest-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cartest-secrets
                  key: DB_PASSWORD
            - name: DINGGO_USERNAME
              valueFrom:
                secretKeyRef:
                  name: cartest-secrets
                  key: DINGGO_USERNAME
            - name: DINGGO_KEY
              valueFrom:
                secretKeyRef:
                  name: cartest-secrets
                  key: DINGGO_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
