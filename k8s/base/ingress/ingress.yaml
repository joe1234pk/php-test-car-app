apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cartest
  namespace: cartest
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
spec:
  ingressClassName: nginx
  rules:
    - host: cartest.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: app
                port:
                  number: 8000
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: app
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 5173
